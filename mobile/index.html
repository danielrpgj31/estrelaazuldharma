<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="description" content="Plataforma de aprendizado espiritual e conhecimento do Dharma" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Estrela Azul" />
    <meta name="mobile-web-app-capable" content="yes" />
    
    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/banner_estrela_azul.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Android Chrome specific -->
    <meta name="msapplication-TileColor" content="#7c3aed" />
    <meta name="msapplication-config" content="/browserconfig.xml" />
    
    <!-- Splash screen (iOS) -->
    <link rel="apple-touch-startup-image" href="/banner_estrela_azul.png" />
    
    <title>Instituto Estrela Azul de Dharma</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((registration) => {
              console.log('[PWA] Service Worker registrado:', registration);
              
              // Verificar atualizações periodicamente
              setInterval(() => {
                registration.update();
              }, 60000); // a cada 1 minuto
            })
            .catch((error) => {
              console.error('[PWA] Erro ao registrar Service Worker:', error);
            });
        });
      }
    </script>
  </body>
</html>
